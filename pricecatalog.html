<!DOCTYPE html>
<html lang="en">
<head>
    <title>Good Grail | Price Catalog</title>
    <link rel="stylesheet" href="header.css">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --accent-navy: #1b4332;
            --bg-soft: #f0f2f5;
            --white: #ffffff;
            --text-dark: #2d3436;
            --text-muted: #636e72;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-soft);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .catalog-container {
            flex: 1;
            padding: 40px 8%;
        }

        .catalog-title {
            font-size: 2.2rem;
            color: var(--accent-navy);
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        .catalog-subtitle {
            color: var(--text-muted);
            margin: 0 0 30px 0;
            font-size: 1.1rem;
        }

        .filter-section {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            align-items: center;
        }

        .search-wrapper input, .filter-wrapper select {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .search-wrapper input:focus, .filter-wrapper select:focus {
            border-color: var(--primary-green);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .filter-wrapper select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='%23636e72'><path d='M0 0l5 6 5-6z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
            padding-right: 40px;
            cursor: pointer;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            border-color: rgba(45, 106, 79, 0.1);
        }

        .product-icon {
            font-size: 3rem;
            background: #f1f5f9;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            flex-shrink: 0;
        }

        .product-details {
            flex-grow: 1;
        }

        .product-details h3 {
            margin: 0 0 5px 0;
            font-size: 1.25rem;
            color: var(--accent-navy);
            font-weight: 800;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-green);
            margin: 5px 0;
        }

        .product-location {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        footer {
            background: var(--accent-navy);
            color: rgba(255,255,255,0.7);
            padding: 30px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        @media(max-width: 900px) {
            .filter-section { grid-template-columns: 1fr; gap: 15px; }
            footer { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">GOOD GRAIL</a>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="pricecatalog.html" style="color: var(--primary-green);">Price Catalog</a>
            <a href="contactpage.html" class="btn-contact">Contact Us</a>
        </nav>
    </header>

    <main class="catalog-container">
        <h1 class="catalog-title">Price Transparency Index</h1>
        <p class="catalog-subtitle">Compare baseline prices across different dynamic local branches to make informed decisions.</p>

        <section class="filter-section">
            <div class="search-wrapper">
                <input type="text" id="catalog-search" placeholder="Type commodity name to filter..." oninput="filterProducts()">
            </div>
            <div class="filter-wrapper">
                <select id="filter-city" onchange="filterProducts()">
                    <option value="">All Metro Cities</option>
                    <option value="Manila">Manila</option>
                    <option value="Quezon">Quezon City</option>
                    <option value="Pasig">Pasig City</option>
                </select>
            </div>
            <div class="filter-wrapper">
                <select id="filter-category" onchange="filterProducts()">
                    <option value="">All Categories</option>
                    <option value="rice">Rice & Grains</option>
                    <option value="eggs">Poultry & Eggs</option>
                    <option value="meat">Fresh Meat</option>
                    <option value="oil">Oils & Condiments</option>
                    <option value="vegetables">Produce & Vegetables</option>
                    <option value="essentials">Baking & Sweets</option>
                </select>
            </div>
        </section>

        <section class="catalog-grid" id="catalog-grid-render"></section>
    </main>

    <footer>
        <div>© 2026 GOOD GRAIL | WEB SYSTEMS Project</div>
        <div style="font-weight: bold; color: white;">SDG 12: Responsible Consumption</div>
    </footer>

<script>
    const SHEETY_API_URL = "https://api.sheety.co/714f9aedd46168f80737977f95b48854/goodGrailData/products";
    let productsRegistry = [];

    async function loadCatalogDatabase() {
        try {
            const response = await fetch(SHEETY_API_URL);
            const data = await response.json();
            productsRegistry = data.products;
            buildCatalog();
        } catch (error) {
            console.error("Catalog Sync Failed:", error);
        }
    }

    function buildCatalog() {
        const container = document.getElementById('catalog-grid-render');
        if(!container) return;
        container.innerHTML = "";

        productsRegistry.forEach(prod => {
           
            container.innerHTML += `
                <div class="product-card" data-name="${prod.name || ''}" data-city="${prod.city || ''}" data-category="${prod.category || ''}" onclick="navigateToProduct(\`${prod.id || ''}\`)">
                    <div class="product-icon">${prod.img || '🌾'}</div>
                    <div class="product-details">
                        <h3>${prod.name || 'Unknown Item'}</h3>
                        <div class="product-location">📍 SM ${prod.city || 'Manila'}</div>
                        <div class="product-price">₱${prod.price || 0}<span style="font-size:0.9rem; color:var(--text-muted); font-weight:500;">/${prod.unit || 'kg'}</span></div>
                    </div>
                </div>
            `;
        });

        const params = new URLSearchParams(window.location.search);
        const searchParam = params.get('search');
        if (searchParam) {
            document.getElementById('catalog-search').value = searchParam;
            filterProducts();
        }
    }

    function filterProducts() {
        const query = document.getElementById('catalog-search').value.toLowerCase().trim();
        const city = document.getElementById('filter-city').value.toLowerCase();
        const cat = document.getElementById('filter-category').value.toLowerCase();
        const cards = document.querySelectorAll('.product-card');

        cards.forEach(card => {
            const name = (card.getAttribute('data-name') || '').toLowerCase();
            const cardCity = (card.getAttribute('data-city') || '').toLowerCase();
            const cardCat = (card.getAttribute('data-category') || '').toLowerCase();

            const matchesSearch = name.includes(query);
            const matchesCity = city === "" || cardCity.includes(city);
            const matchesCategory = cat === "" || cardCat === cat;

            card.style.display = (matchesSearch && matchesCity && matchesCategory) ? "flex" : "none";
        });
    }

    function navigateToProduct(id) {
        const prod = productsRegistry.find(p => String(p.id) === String(id));
        if (!prod) return;
        
        window.location.href = `productpage.html?id=${prod.id}&name=${encodeURIComponent(prod.name)}&price=${prod.price}&unit=${encodeURIComponent(prod.unit || 'kg')}&city=${encodeURIComponent(prod.city)}&img=${encodeURIComponent(prod.img)}`;
    }

    window.onload = loadCatalogDatabase;
</script>
</body>
</html>
